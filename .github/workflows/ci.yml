name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    permissions:
      contents: read
      packages: read
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@ffc0652da3f2073f8c91c458ce415068145400c7 # main
    with:
      package-manager: pnpm
      run-lint: true
      run-test: true
      run-build: true

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: mattriley-tools
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
