name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@v2
    with:
      install: true
      lint: true
      test: true
      build: true
      fmt: true

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: mattriley-tools
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
