name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package-read-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    permissions:
      contents: read
    steps:
      - name: Validate GitHub App configuration
        env:
          APP_ID: ${{ vars.APP_ID }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Repository variable APP_ID is required." >&2
            exit 1
          fi

      - name: Create GitHub App token for Snurble packages
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          repositories: snurble

  ci:
    needs: package-read-token
    permissions:
      contents: read
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@e481ad8972d9a391e0a743cf577ca8cbcd429f2d # main
    with:
      package-manager: pnpm
      run-lint: true
      run-test: true
      run-build: true
    secrets:
      node_auth_token: ${{ needs.package-read-token.outputs.token }}

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: mattriley-tools
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
