name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@bcaf4ae43edf7d26421741424b82c842c83e55ce # v2.1.0
    with:
      install: true
      lint: true
      test: true
      build: true
      fmt: true

  generated-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out site repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check out Homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: matt-riley/homebrew-tools
          path: homebrew-tools-source

      - name: Check out agent skills catalog
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: matt-riley/agent-skills
          path: agent-skills-source

      - name: Enable Corepack
        run: corepack enable

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true
          cache: true

      - name: Cache pnpm store
        # Shares the same key as the reusable ci job so both jobs warm each
        # other's cache; restores before `mise run install` links the store.
        if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/pnpm
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        env:
          MISE_GITHUB_TOKEN: ${{ github.token }}
        run: mise run install

      - name: Regenerate site data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          pnpm run generate:data -- --tap-path "${{ github.workspace }}/homebrew-tools-source" --skills-path "${{ github.workspace }}/agent-skills-source"

      - name: Report generated data drift
        run: |
          nonTimestampDiff=$(
            git diff -- src/data/*.generated.ts \
              | grep -vE '^([+-])export const .*[Gg]eneratedAt = ' \
              | grep -E '^([+-])' \
              || true
          )

          if [ -n "$nonTimestampDiff" ]; then
            echo "::warning::Generated data files are out of date with live sources (ignoring timestamp changes). Run 'pnpm run generate:data' and commit, or wait for the scheduled sync."
          else
            echo "Generated data files are up to date (ignoring timestamp changes)."
          fi

  deploy:
    needs: [ci, generated-data]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: mattriley-tools
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
