name: Sync site data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tools-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site repo
        uses: actions/checkout@v4

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: matt-riley/homebrew-tools
          path: tap-source

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate site data
        run: pnpm run generate:data -- --tap-path "${{ github.workspace }}/tap-source"

      - name: Commit updated site data
        run: |
          if git diff --quiet -- src/data/tools.generated.ts src/data/plugins.generated.ts; then
            echo "No site data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tools.generated.ts src/data/plugins.generated.ts
          git commit -m "chore(data): sync generated site metadata"
          git push
