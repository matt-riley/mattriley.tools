name: Sync site data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tools-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate GitHub App configuration
        env:
          APP_ID: ${{ vars.APP_ID }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Repository variable APP_ID is required." >&2
            exit 1
          fi

      - name: Create GitHub App token for private tool repos
        id: tool-readme-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          repositories: hopcli,newbrew,workv2

      - name: Check out Homebrew tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: matt-riley/homebrew-tools
          path: tap-source

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate site data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TOOL_REPOS_GITHUB_TOKEN: ${{ steps.tool-readme-token.outputs.token }}
        run: pnpm run generate:data -- --tap-path "${{ github.workspace }}/tap-source"

      - name: Commit updated site data
        run: |
          if [ -z "$(git status --porcelain -- src/data/tools.generated.ts src/data/plugins.generated.ts public/generated/readme-images)" ]; then
            echo "No site data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tools.generated.ts src/data/plugins.generated.ts public/generated/readme-images
          git commit -m "chore(data): sync generated site metadata"
          git push
