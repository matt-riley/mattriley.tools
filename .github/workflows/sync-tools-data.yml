name: Sync site data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tools-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate GitHub App configuration
        env:
          APP_ID: ${{ vars.APP_ID }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Repository variable APP_ID is required." >&2
            exit 1
          fi

      - name: Create GitHub App token for private tool repos
        id: tool-readme-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          repositories: hopcli,newbrew,workv2

      - name: Check out Homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: matt-riley/homebrew-tools
          path: tap-source

      - name: Check out agent skills catalog
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: matt-riley/agent-skills
          path: agent-skills-source

      - name: Enable Corepack
        run: corepack enable

      - name: Set up mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          install: true
          cache: true

      - name: Install dependencies
        env:
          MISE_GITHUB_TOKEN: ${{ steps.tool-readme-token.outputs.token }}
        run: mise run install

      - name: Regenerate site data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ steps.tool-readme-token.outputs.token }}
          TOOL_REPOS_GITHUB_TOKEN: ${{ steps.tool-readme-token.outputs.token }}
        run: |
          pnpm run generate:data -- --tap-path "${{ github.workspace }}/tap-source" --skills-path "${{ github.workspace }}/agent-skills-source"
          pnpm run format

      - name: Commit updated site data
        run: |
          if [ -z "$(git status --porcelain -- src/data/tools.generated.ts src/data/plugins.generated.ts src/data/templates.generated.ts src/data/skills.generated.ts public/generated/readme-images)" ]; then
            echo "No site data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tools.generated.ts src/data/plugins.generated.ts src/data/templates.generated.ts src/data/skills.generated.ts public/generated/readme-images
          git commit -m "chore(data): sync generated site metadata"
          git push
